<div class="form-container">
  <div class="form-card">
    <h2>{{ usuarioId ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>

    <form (ngSubmit)="guardar()">
      <div class="form-group">
        <label>Email:</label>
        <input type="text" [(ngModel)]="usuario.email" name="email" required />
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" [(ngModel)]="usuario.password" name="password" placeholder="Dejar vacío si no desea cambiar" />
      </div>

      <div class="form-group">
        <label>Rol</label>
        <select id="rol" [(ngModel)]="usuario.rol" name="rol" required>
            <option [value]="1">Usuario</option>
            <option [value]="2">Administrador</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ usuarioId ? 'Actualizar' : 'Crear' }}</button>
        <button type="button" class="btn btn-secondary" (click)="irAUsuarios()">Regresar</button>
      </div>
    </form>
  </div>
</div>
