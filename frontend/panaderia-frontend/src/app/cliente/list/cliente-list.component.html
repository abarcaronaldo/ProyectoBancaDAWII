<section class="bank-section">
  <div class="section-header">
    <h3>Mantenimiento de clientes</h3>
    <button class="primary" (click)="nuevo()">Nuevo cliente</button>
  </div>

  <div class="toolbar-card">
    <label class="search-field">
      <span>Buscar cliente</span>
      <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar por nombre o DNI" />
    </label>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>DNI</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of filteredClientes">
          <td>{{ cliente.dni }}</td>
          <td>{{ cliente.nombre }} {{ cliente.apellido }}</td>
          <td>{{ cliente.email }}</td>
          <td>{{ cliente.telefono }}</td>
          <td>{{ cliente.activo ? 'Activo' : 'Inactivo' }}</td>
          <td class="actions-cell">
            <button class="secondary" (click)="editar(cliente.id)">Editar</button>
            <button class="danger" (click)="desactivar(cliente.id)">Desactivar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
