server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/clientes/**
          filters:
            - AuthenticationFilter

        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/cuentas/**
          filters:
            - AuthenticationFilter

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/transacciones/**
          filters:
            - AuthenticationFilter

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: "Cibertec_ProyectoIntegrador_Microservicios_ExamenFinal_2026_KeySecure!"
    expiration-minutes: 60